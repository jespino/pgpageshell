version: 2

builds:
  - id: pgpageshell
    binary: pgpageshell
    ldflags:
      - -s -w
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64

archives:
  - id: pgpageshell
    builds:
      - pgpageshell
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

nfpms:
  - id: pgpageshell
    package_name: pgpageshell
    builds:
      - pgpageshell
    vendor: jespino
    homepage: https://github.com/jespino/pgpageshell
    maintainer: Jesús Espino <jespinog@gmail.com>
    description: Desktop application for inspecting PostgreSQL data files at the page level.
    license: MIT
    formats:
      - deb
      - rpm

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: jespino
    name: pgpageshell
