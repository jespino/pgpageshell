version: 2

before:
  hooks:
    - cmd: sh -c "cd frontend && pnpm install --frozen-lockfile && pnpm run build"

builds:
  - id: pgpageshell
    binary: pgpageshell
    tags: "{{ .Env.BUILD_TAGS }}"
    ldflags:
      - -s -w
    env:
      - CGO_ENABLED=1
      - CGO_LDFLAGS={{ .Env.CGO_LDFLAGS }}
    goos:
      - "{{ .Env.GOOS }}"
    goarch:
      - "{{ .Env.GOARCH }}"

archives:
  - id: pgpageshell
    builds:
      - pgpageshell
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

nfpms:
  - id: pgpageshell
    package_name: pgpageshell
    builds:
      - pgpageshell
    vendor: jespino
    homepage: https://github.com/jespino/pgpageshell
    maintainer: Jesús Espino <jespinog@gmail.com>
    description: Desktop application for inspecting PostgreSQL data files at the page level.
    license: MIT
    formats:
      - deb
      - rpm

checksum:
  disable: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: jespino
    name: pgpageshell
