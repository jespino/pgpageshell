name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            build_tags: "production webkit2_41"
            cgo_ldflags: ""
            setup: |
              sudo apt-get update -qq
              sudo apt-get install -y -qq pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            build_tags: "production webkit2_41"
            cgo_ldflags: ""
            setup: |
              sudo apt-get update -qq
              sudo apt-get install -y -qq pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev
          - runner: windows-latest
            goos: windows
            goarch: amd64
            build_tags: production
            cgo_ldflags: ""
            setup: ""
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install system dependencies
        if: matrix.setup != ''
        run: ${{ matrix.setup }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --split
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          BUILD_TAGS: ${{ matrix.build_tags }}
          CGO_LDFLAGS: ${{ matrix.cgo_ldflags }}

      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/**/*
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: dist
          merge-multiple: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: continue --merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
